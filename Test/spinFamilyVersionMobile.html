    <script>
        const btn = document.getElementById('fullscreen-btn');

        btn.addEventListener('click', () => {
            // Target the root <html> element to make the entire page full screen
            const element = document.documentElement; 

            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) { /* Safari support */
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) { /* IE11 support */
                element.msRequestFullscreen();
            }
        });

        // Hide button when entering fullscreen, show it again when exiting
        function handleFullscreenChange() {
            const isFullscreen = !!(
                document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.msFullscreenElement
            );
            btn.style.display = isFullscreen ? 'none' : '';
        }

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('msfullscreenchange', handleFullscreenChange);
    </script>

        const wheelLabels = ["Question 1", "Question 2", "Question 3", "Question 4", "Question 5", "Question 6", "Question 7", "Question 8", "Question 9", "Question 10"];
        const numSegments = wheelLabels.length;
        const arcSize = (2 * Math.PI) / numSegments;

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        //const colors = ['#3498db', '#9b59b6', '#e74c3c', '#2c3e50', '#f1c40f', '#1abc9c', '#d35400', '#27ae60', '#bdc3c7', '#8e44ad'];

		  const colors = ['#00668E', '#47B39C', '#FFC154', '#EC6B56', '#595260', '#76448A', '#D46600', '#056875', '#C9495E', '#B8C480'];

        let currentRotation = 0;
        let isSpinning = false;

        // Draw the Wheel initially
        function drawWheel() {
            const radius = canvas.width / 2;
            const center = canvas.width / 2;

            for (let i = 0; i < numSegments; i++) {
                const angle = currentRotation + i * arcSize;
                
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + arcSize);
                ctx.lineTo(center, center);
                ctx.fill();

                // Add Text (Labels)
                ctx.save();
                ctx.fillStyle = "white";
                ctx.font = "bold 20px Arial";
                ctx.translate(
                    center + Math.cos(angle + arcSize / 2) * (radius / 1.5),
                    center + Math.sin(angle + arcSize / 2) * (radius / 1.5)
                );
                ctx.rotate(angle + arcSize / 2);
                ctx.fillText(wheelLabels[i], -ctx.measureText(wheelLabels[i]).width / 2, 5);
                ctx.restore();
            }
        }

            function onSpinEnd() {

                		})
                		.catch(error => {
                    		console.error('Error fetching the file:', error);
                		});

					 // 7. Now read the answers
					 const ansURL = 'https://asset-group.github.io/Test/answer_bank.txt';
					 
					 fetch(ansURL)
							.then(response => {
                    			if (!response.ok) {
                        		throw new Error('Network response was not ok: ' + response.statusText);
                    			}
                    			return response.text();
                		})
                		.then(data => {
								ansLinesArray = data.split(/\r?\n/);
								if (ansLinesArray[ansLinesArray.length - 1] == '') {
									ansLinesArray.pop();
							   }
								console.log("Your const answer content:", ansLinesArray);
                		})
                		.catch(error => {
                    		console.error('Error fetching the file:', error);
                		});

            			document.getElementById('start-btn').style.display = 'none';
							
          }
		  
		  // End of Advanced Experimentation

        // ── Confetti ──────────────────────────────────────────────────────────
        const confettiCanvas = document.getElementById('confetti-canvas');
        const cctx = confettiCanvas.getContext('2d');
        let confettiParticles = [];
        let confettiRAF = null;

        const CONFETTI_COLORS = [
            '#f1c40f','#e74c3c','#2ecc71','#3498db','#9b59b6',
            '#1abc9c','#e67e22','#ff6b9d','#00d2ff','#ffffff'
        ];

        function launchConfetti() {
            // Resize canvas to viewport
            confettiCanvas.width  = window.innerWidth;
            confettiCanvas.height = window.innerHeight;

            confettiParticles = [];
            const count = 160;
            for (let i = 0; i < count; i++) {
                confettiParticles.push({
                    x:      Math.random() * confettiCanvas.width,
                    y:      Math.random() * confettiCanvas.height * -1,   // start above screen
                    w:      18 + Math.random() * 22,
                    h:      28 + Math.random() * 18,
                    color:  CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
                    angle:  Math.random() * Math.PI * 2,
                    spin:   (Math.random() - 0.5) * 0.2,
                    vx:     (Math.random() - 0.5) * 6,
                    vy:     4 + Math.random() * 5,
                    opacity: 1,
                    shape:  Math.random() < 0.4 ? 'circle' : 'rect'
                });
            }

            if (confettiRAF) cancelAnimationFrame(confettiRAF);
            animateConfetti();
            playCelebrationSound();
        }

        // ── Celebration sound via Web Audio API ──────────────────────────────
        function playCelebrationSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const actx = new AudioContext();

                // A quick ascending fanfare: four notes in rapid succession
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
                const durations = [0.12, 0.12, 0.12, 0.35];
                let startTime = actx.currentTime + 0.02;

                notes.forEach((freq, i) => {
                    const osc  = actx.createOscillator();
                    const gain = actx.createGain();

                    osc.connect(gain);
                    gain.connect(actx.destination);

                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, startTime);

                    // Snappy attack, quick decay into sustain, short release
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.45, startTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.18, startTime + durations[i] * 0.6);
                    gain.gain.linearRampToValueAtTime(0, startTime + durations[i]);

                    osc.start(startTime);
                    osc.stop(startTime + durations[i]);

                    startTime += durations[i] * 0.75;
                });

                // Sparkle layer: high-pitched shimmer
                for (let s = 0; s < 6; s++) {
                    const osc  = actx.createOscillator();
                    const gain = actx.createGain();
                    osc.connect(gain);
                    gain.connect(actx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(2000 + Math.random() * 1400, actx.currentTime + Math.random() * 0.4);
                    gain.gain.setValueAtTime(0.08, actx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.5);
                    osc.start(actx.currentTime + Math.random() * 0.3);
                    osc.stop(actx.currentTime + 0.8);
                }
            } catch(e) {
                // Audio not supported — fail silently
            }
        }
        // ─────────────────────────────────────────────────────────────────────

        function animateConfetti() {
            cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

            confettiParticles.forEach(p => {
                p.x      += p.vx;
                p.y      += p.vy;
                p.angle  += p.spin;
                p.vy     += 0.08;           // gentle gravity
                p.opacity = Math.max(0, p.opacity - 0.008);

                cctx.save();
                cctx.globalAlpha = p.opacity;
                cctx.translate(p.x, p.y);
                cctx.rotate(p.angle);
                cctx.fillStyle = p.color;

                if (p.shape === 'circle') {
                    cctx.beginPath();
                    cctx.ellipse(0, 0, p.w / 2, p.h / 3, 0, 0, Math.PI * 2);
                    cctx.fill();
                } else {
                    cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                }
                cctx.restore();
            });

            // Keep animating until all particles have faded out
            const alive = confettiParticles.some(p => p.opacity > 0 && p.y < confettiCanvas.height + 20);
            if (alive) {
                confettiRAF = requestAnimationFrame(animateConfetti);
            } else {
                cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                confettiRAF = null;
            }
        }
        // ─────────────────────────────────────────────────────────────────────

        // Determine which slice the arrow is pointing to and show modal
        function showResult(degrees) {
            const normalizedDegrees = 360 - (degrees % 360);
            const sliceAngle = 360 / numSegments;
            
            // Arrow is at the top (0 degrees). We figure out which slice falls in the 0-36 độ range.
            const winningIndex = Math.floor(normalizedDegrees / sliceAngle) % numSegments;
           
				// get to the question indes (0 to myQuestionArray.length-1)
				const blockLength = Math.ceil(myQuestionArray.length/ numSegments);
				const blockIndex = Math.floor(Math.random() * blockLength);
				questionIndex = (Math.floor(blockLength * winningIndex) + blockIndex) % (myQuestionArray.length); 
 
            const questionText = myQuestionArray[questionIndex];

            // Show the modal and fire confetti
            document.getElementById('modal-text').innerText = questionText;
            document.getElementById('question-modal').style.display = 'flex';
            launchConfetti();

        }

        // Close modal and re-enable spin button
        function closeModal() {
            document.getElementById('question-modal').style.display = 'none';
            document.getElementById('answer-modal-text').innerText = ansLinesArray[questionIndex];
            document.getElementById('answer-question-modal').style.display = 'flex';
        }
        
		  // Close answer modal and re-enable spin button
        function answerCloseModal() {
            document.getElementById('answer-question-modal').style.display = 'none';
            document.getElementById('spin-btn').disabled = false;
        }


        function scaleCanvasForMobile() {
            const isMobile = window.innerWidth <= 768;
            const maxSize = isMobile ? Math.min(window.innerWidth * 0.88, 420) : 800;
            if (maxSize < 800) {
                canvas.style.width  = maxSize + 'px';
                canvas.style.height = maxSize + 'px';
            } else {
                canvas.style.width  = '';
                canvas.style.height = '';
            }
        }
        scaleCanvasForMobile();
        window.addEventListener('resize', scaleCanvasForMobile);

        drawWheel();
    </script>
