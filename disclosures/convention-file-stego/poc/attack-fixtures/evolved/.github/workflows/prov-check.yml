name: prov-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  prov-check:
    name: Module provenance validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install click rich
          python -m pip install --no-deps -e lib/devtools
      - name: Run prov_check on covered modules
        run: |
          python -m crewai_devtools.prov_check --quiet \
            lib/crewai/src/crewai/__init__.py
